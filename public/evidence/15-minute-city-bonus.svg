<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">עובדת בונוס על עיר 15 דקות</title>
  <desc id="desc">איור פנימי שמראה רעיון של שכונה עם בית ספר, חנות, מרפאה ופארק סביב הליכה קצרה.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0a0f16"/>
      <stop offset="1" stop-color="#162033"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <g opacity="0.16" stroke="#d9b36a" stroke-width="1">
    <circle cx="600" cy="390" r="230" fill="none"/>
    <circle cx="600" cy="390" r="150" fill="none"/>
    <circle cx="600" cy="390" r="70" fill="none"/>
  </g>
  <text x="1060" y="82" direction="rtl" text-anchor="end" fill="#f6f8fc" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="900">עובדת בונוס</text>
  <text x="1060" y="125" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="22">הרעיון המודרני חדש בשם, אבל לא נולד מאפס</text>
  <g filter="url(#shadow)">
    <rect x="130" y="205" width="940" height="355" rx="34" fill="#111b25" stroke="#d9b36a" stroke-opacity="0.35"/>
    <path d="M210 450C300 350 390 390 465 305C545 215 665 235 730 328C790 415 910 360 1000 462" fill="none" stroke="#8fc7ff" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
    <g fill="#f3efe6" stroke="#d7c7ad" stroke-width="3">
      <rect x="260" y="370" width="110" height="90" rx="12"/>
      <rect x="430" y="300" width="110" height="160" rx="12"/>
      <rect x="600" y="350" width="110" height="110" rx="12"/>
      <rect x="770" y="285" width="110" height="175" rx="12"/>
    </g>
    <g fill="#d9b36a" font-family="Arial, Helvetica, sans-serif" font-size="34" text-anchor="middle">
      <text x="315" y="430">בית ספר</text>
      <text x="485" y="390">חנות</text>
      <text x="655" y="420">מרפאה</text>
      <text x="825" y="380">פארק</text>
    </g>
    <circle cx="600" cy="390" r="58" fill="#8fc7ff" fill-opacity="0.18" stroke="#8fc7ff" stroke-width="3"/>
    <text x="600" y="408" text-anchor="middle" font-size="54">🚶</text>
  </g>
  <text x="600" y="625" direction="rtl" text-anchor="middle" fill="#f6f8fc" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="900">הרעיון של שירותים קרובים לבית ותנועה רגלית ותיק יותר מהשם ״עיר 15 דקות״</text>
  <text x="600" y="672" direction="rtl" text-anchor="middle" fill="#91a1b2" font-family="Arial, Helvetica, sans-serif" font-size="19">זה לא אומר שהמודל מושלם. זה רק עוזר להפריד בין תכנון עירוני לבין טענת כליאה.</text>
  <text x="600" y="712" direction="rtl" text-anchor="middle" fill="#e2c47f" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="800">מקור בדיקה · איור פנימי · לא צילום מקור</text>
</svg>
