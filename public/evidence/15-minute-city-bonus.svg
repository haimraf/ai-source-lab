<svg xmlns="http://www.w3.org/2000/svg" width="720" height="900" viewBox="0 0 720 900" role="img" aria-labelledby="title desc">
  <title id="title">עובדת בונוס על עיר 15 דקות</title>
  <desc id="desc">איור פנימי של שירותים קרובים לבית סביב הליכה קצרה.</desc>
  <defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#0a0f16"/><stop offset="1" stop-color="#162033"/></linearGradient></defs>
  <rect width="720" height="900" rx="32" fill="url(#bg)"/>
  <text x="660" y="68" direction="rtl" text-anchor="start" fill="#f6f8fc" font-family="Arial, sans-serif" font-size="38" font-weight="800">שירותים קרובים לבית</text>
  <text x="660" y="108" direction="rtl" text-anchor="start" fill="#aab3c5" font-family="Arial, sans-serif" font-size="22">רעיון ותיק יותר מהשם ״עיר 15 דקות״</text>
  <circle cx="360" cy="420" r="230" fill="#111b25" stroke="#d9b36a" stroke-opacity=".45" stroke-width="3"/>
  <circle cx="360" cy="420" r="138" fill="none" stroke="#8fc7ff" stroke-opacity=".45" stroke-width="3"/>
  <circle cx="360" cy="420" r="64" fill="#8fc7ff" fill-opacity=".16" stroke="#8fc7ff" stroke-width="3"/>
  <text x="360" y="410" text-anchor="middle" fill="#f6f8fc" font-family="Arial, sans-serif" font-size="34" font-weight="800">15</text>
  <text x="360" y="446" text-anchor="middle" fill="#aab3c5" font-family="Arial, sans-serif" font-size="20">דקות</text>
  <g font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#e2c47f" text-anchor="middle">
    <rect x="78" y="260" width="170" height="76" rx="20" fill="#111b25" stroke="#d9b36a"/><text x="163" y="307">בית ספר</text>
    <rect x="472" y="260" width="170" height="76" rx="20" fill="#111b25" stroke="#d9b36a"/><text x="557" y="307">חנות</text>
    <rect x="78" y="518" width="170" height="76" rx="20" fill="#111b25" stroke="#d9b36a"/><text x="163" y="565">מרפאה</text>
    <rect x="472" y="518" width="170" height="76" rx="20" fill="#111b25" stroke="#d9b36a"/><text x="557" y="565">פארק</text>
  </g>
  <text x="360" y="728" direction="rtl" text-anchor="middle" fill="#f6f8fc" font-family="Arial, sans-serif" font-size="27" font-weight="800">קרבה אינה הוכחה לכליאה</text>
  <text x="360" y="774" direction="rtl" text-anchor="middle" fill="#aab3c5" font-family="Arial, sans-serif" font-size="21">מפרידים בין תכנון עירוני לבין טענת הגבלה</text>
  <text x="360" y="830" direction="rtl" text-anchor="middle" fill="#e2c47f" font-family="Arial, sans-serif" font-size="17" font-weight="700">מקור בדיקה · איור פנימי · לא צילום מקור</text>
</svg>
