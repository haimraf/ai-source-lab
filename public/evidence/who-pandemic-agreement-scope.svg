<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1000" viewBox="0 0 720 1000" role="img" aria-labelledby="title desc">
  <title id="title">אמנת המגיפות: הסכם, יישום וטענת כפייה</title>
  <desc id="desc">איור פנימי שמפריד בין הסכם בינלאומי, יישום דרך מדינות וטענת כפייה.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#0b1118"/><stop offset="1" stop-color="#101927"/></linearGradient>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse"><path d="M72 0H0V72" fill="none" stroke="#8fc7ff" stroke-opacity=".1"/></pattern>
  </defs>
  <rect width="720" height="1000" rx="32" fill="url(#bg)"/>
  <rect width="720" height="1000" rx="32" fill="url(#grid)"/>
  <text x="660" y="68" direction="rtl" text-anchor="start" fill="#f6f8fc" font-family="Arial, sans-serif" font-size="38" font-weight="800">אמנת המגיפות: לא לערבב</text>
  <text x="660" y="108" direction="rtl" text-anchor="start" fill="#aab3c5" font-family="Arial, sans-serif" font-size="22">הסכם, יישום מדינתי וטענת כפייה</text>
  <g transform="translate(48 150)">
    <rect width="624" height="210" rx="26" fill="#111b25" stroke="#8fc7ff" stroke-opacity=".48"/>
    <circle cx="558" cy="66" r="38" fill="#8fc7ff" fill-opacity=".14" stroke="#8fc7ff" stroke-width="2"/>
    <text x="558" y="77" text-anchor="middle" fill="#8fc7ff" font-family="Arial, sans-serif" font-size="30" font-weight="800">01</text>
    <text x="500" y="62" direction="rtl" text-anchor="start" fill="#f6f8fc" font-family="Arial, sans-serif" font-size="30" font-weight="800">ההסכם</text>
    <text x="560" y="120" direction="rtl" text-anchor="start" fill="#aab3c5" font-family="Arial, sans-serif" font-size="24">היערכות למגיפות ושיתוף פעולה</text>
    <text x="560" y="158" direction="rtl" text-anchor="start" fill="#aab3c5" font-family="Arial, sans-serif" font-size="24">מסגרת בינלאומית</text>
  </g>
  <g transform="translate(48 390)">
    <rect width="624" height="210" rx="26" fill="#111b25" stroke="#d9b36a" stroke-opacity=".58"/>
    <circle cx="558" cy="66" r="38" fill="#d9b36a" fill-opacity=".14" stroke="#d9b36a" stroke-width="2"/>
    <text x="558" y="77" text-anchor="middle" fill="#e2c47f" font-family="Arial, sans-serif" font-size="30" font-weight="800">02</text>
    <text x="500" y="62" direction="rtl" text-anchor="start" fill="#f6f8fc" font-family="Arial, sans-serif" font-size="30" font-weight="800">המדינה</text>
    <text x="560" y="120" direction="rtl" text-anchor="start" fill="#aab3c5" font-family="Arial, sans-serif" font-size="24">חתימה, אשרור וחוק פנימי</text>
    <text x="560" y="158" direction="rtl" text-anchor="start" fill="#aab3c5" font-family="Arial, sans-serif" font-size="24">מדיניות מקומית</text>
  </g>
  <g transform="translate(48 630)">
    <rect width="624" height="210" rx="26" fill="#111b25" stroke="#ffadad" stroke-opacity=".58"/>
    <circle cx="558" cy="66" r="38" fill="#ffadad" fill-opacity=".12" stroke="#ffadad" stroke-width="2"/>
    <text x="558" y="77" text-anchor="middle" fill="#ffadad" font-family="Arial, sans-serif" font-size="30" font-weight="800">03</text>
    <text x="500" y="62" direction="rtl" text-anchor="start" fill="#f6f8fc" font-family="Arial, sans-serif" font-size="30" font-weight="800">טענת כפייה</text>
    <text x="560" y="120" direction="rtl" text-anchor="start" fill="#aab3c5" font-family="Arial, sans-serif" font-size="24">סגרים, חיסונים ושינוי חוק</text>
    <text x="560" y="158" direction="rtl" text-anchor="start" fill="#aab3c5" font-family="Arial, sans-serif" font-size="24">כאן נדרשת הוכחה נפרדת</text>
  </g>
  <text x="360" y="904" direction="rtl" text-anchor="middle" fill="#e2c47f" font-family="Arial, sans-serif" font-size="24" font-weight="700">מסגרת תיאום אינה כשלעצמה סמכות כפייה</text>
  <text x="360" y="950" direction="rtl" text-anchor="middle" fill="#91a1b2" font-family="Arial, sans-serif" font-size="18">מקור בדיקה · איור פנימי · לא צילום מקור</text>
</svg>
