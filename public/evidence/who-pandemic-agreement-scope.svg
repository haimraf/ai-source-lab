<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">אמנת המגיפות: הסכם, יישום וטענת כפייה</title>
  <desc id="desc">איור פנימי שמפריד בין הסכם בינלאומי, יישום דרך מדינות וטענת כפייה של WHO.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1118"/>
      <stop offset="1" stop-color="#101927"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <g opacity="0.18" stroke="#8fc7ff" stroke-width="1">
    <path d="M0 96H1200M0 192H1200M0 288H1200M0 384H1200M0 480H1200M0 576H1200M0 672H1200"/>
    <path d="M120 0V760M240 0V760M360 0V760M480 0V760M600 0V760M720 0V760M840 0V760M960 0V760M1080 0V760"/>
  </g>
  <text x="1060" y="78" direction="rtl" text-anchor="end" fill="#f6f8fc" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="900">אמנת המגיפות: מה לא לערבב?</text>
  <text x="1060" y="118" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="22">הבדיקה מפרידה בין הסכם, יישום מדינתי וטענת כפייה</text>

  <g filter="url(#shadow)">
    <rect x="770" y="190" width="320" height="370" rx="30" fill="#111b25" stroke="#8fc7ff" stroke-opacity="0.35"/>
    <circle cx="930" cy="285" r="62" fill="#8fc7ff" fill-opacity="0.13" stroke="#8fc7ff"/>
    <text x="930" y="302" text-anchor="middle" font-size="56">📄</text>
    <text x="1030" y="385" direction="rtl" text-anchor="end" fill="#f6f8fc" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="900">1. ההסכם</text>
    <text x="1030" y="428" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="20">היערכות למגיפות</text>
    <text x="1030" y="462" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="20">שיתוף פעולה</text>
    <text x="1030" y="496" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="20">מסגרת בינלאומית</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="440" y="190" width="320" height="370" rx="30" fill="#111b25" stroke="#d9b36a" stroke-opacity="0.45"/>
    <circle cx="600" cy="285" r="62" fill="#d9b36a" fill-opacity="0.13" stroke="#d9b36a"/>
    <text x="600" y="302" text-anchor="middle" font-size="56">🏛️</text>
    <text x="700" y="385" direction="rtl" text-anchor="end" fill="#f6f8fc" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="900">2. המדינה</text>
    <text x="700" y="428" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="20">חתימה ואשרור</text>
    <text x="700" y="462" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="20">חוק פנימי</text>
    <text x="700" y="496" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="20">מדיניות מקומית</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="110" y="190" width="320" height="370" rx="30" fill="#111b25" stroke="#ffadad" stroke-opacity="0.45"/>
    <circle cx="270" cy="285" r="62" fill="#ffadad" fill-opacity="0.13" stroke="#ffadad"/>
    <text x="270" y="302" text-anchor="middle" font-size="56">⚠️</text>
    <text x="370" y="385" direction="rtl" text-anchor="end" fill="#f6f8fc" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="900">3. טענת כפייה</text>
    <text x="370" y="428" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="20">סגרים</text>
    <text x="370" y="462" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="20">חיסונים</text>
    <text x="370" y="496" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="20">שינוי חוק</text>
  </g>

  <path d="M760 600H440" stroke="#d9b36a" stroke-width="3" stroke-dasharray="10 12" opacity="0.7"/>
  <path d="M430 600H110" stroke="#ffadad" stroke-width="3" stroke-dasharray="10 12" opacity="0.7"/>
  <text x="600" y="650" direction="rtl" text-anchor="middle" fill="#e2c47f" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">הקפיצה הלוגית מתחילה כשמסגרת תיאום מוצגת כסמכות כפייה</text>
  <text x="600" y="695" direction="rtl" text-anchor="middle" fill="#91a1b2" font-family="Arial, Helvetica, sans-serif" font-size="18">מקור בדיקה · איור פנימי · לא צילום מקור</text>
</svg>
