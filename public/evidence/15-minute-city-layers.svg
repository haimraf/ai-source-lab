<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">שלוש שכבות שלא מערבבים בבדיקת עיר 15 דקות</title>
  <desc id="desc">איור פנימי שמפריד בין רעיון תכנוני, מדיניות תחבורה מקומית וטענת כליאה.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1118"/>
      <stop offset="1" stop-color="#101927"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <g opacity="0.18" stroke="#8fc7ff" stroke-width="1">
    <path d="M0 96H1200M0 192H1200M0 288H1200M0 384H1200M0 480H1200M0 576H1200M0 672H1200"/>
    <path d="M120 0V760M240 0V760M360 0V760M480 0V760M600 0V760M720 0V760M840 0V760M960 0V760M1080 0V760"/>
  </g>
  <text x="1060" y="78" direction="rtl" text-anchor="end" fill="#f6f8fc" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="900">עיר 15 דקות: מה לא לערבב?</text>
  <text x="1060" y="118" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="22">הבדיקה מפרידה בין רעיון, מדיניות מקומית וטענה קונספירטיבית</text>

  <g filter="url(#shadow)">
    <rect x="770" y="190" width="320" height="370" rx="30" fill="#111b25" stroke="#8fc7ff" stroke-opacity="0.35"/>
    <circle cx="930" cy="285" r="62" fill="#8fc7ff" fill-opacity="0.13" stroke="#8fc7ff"/>
    <text x="930" y="302" text-anchor="middle" font-size="56">🏘️</text>
    <text x="1030" y="385" direction="rtl" text-anchor="end" fill="#f6f8fc" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="900">1. רעיון תכנוני</text>
    <text x="1030" y="428" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="20">שירותים קרובים לבית</text>
    <text x="1030" y="462" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="20">פחות תלות ברכב</text>
    <text x="1030" y="496" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="20">עירוב שימושים</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="440" y="190" width="320" height="370" rx="30" fill="#111b25" stroke="#d9b36a" stroke-opacity="0.45"/>
    <circle cx="600" cy="285" r="62" fill="#d9b36a" fill-opacity="0.13" stroke="#d9b36a"/>
    <text x="600" y="302" text-anchor="middle" font-size="56">🚦</text>
    <text x="700" y="385" direction="rtl" text-anchor="end" fill="#f6f8fc" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="900">2. מדיניות תחבורה</text>
    <text x="700" y="428" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="20">traffic filters</text>
    <text x="700" y="462" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="20">הפחתת עומס תנועה</text>
    <text x="700" y="496" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="20">תוכנית מקומית נפרדת</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="110" y="190" width="320" height="370" rx="30" fill="#111b25" stroke="#ffadad" stroke-opacity="0.45"/>
    <circle cx="270" cy="285" r="62" fill="#ffadad" fill-opacity="0.13" stroke="#ffadad"/>
    <text x="270" y="302" text-anchor="middle" font-size="56">🔒</text>
    <text x="370" y="385" direction="rtl" text-anchor="end" fill="#f6f8fc" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="900">3. טענת כליאה</text>
    <text x="370" y="428" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="20">איסור לצאת מהשכונה</text>
    <text x="370" y="462" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="20">מעקב אישי חובה</text>
    <text x="370" y="496" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="20">כאן צריך מקור חזק</text>
  </g>

  <path d="M760 600H440" stroke="#d9b36a" stroke-width="3" stroke-dasharray="10 12" opacity="0.7"/>
  <path d="M430 600H110" stroke="#ffadad" stroke-width="3" stroke-dasharray="10 12" opacity="0.7"/>
  <text x="600" y="650" direction="rtl" text-anchor="middle" fill="#e2c47f" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">הקפיצה הלוגית מתחילה כששכבה אחת מוצגת כהוכחה לשכבה אחרת</text>
  <text x="600" y="695" direction="rtl" text-anchor="middle" fill="#91a1b2" font-family="Arial, Helvetica, sans-serif" font-size="18">מקור בדיקה · איור פנימי · לא צילום מקור</text>
</svg>
