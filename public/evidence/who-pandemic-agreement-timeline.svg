<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1180" viewBox="0 0 720 1180" role="img" aria-labelledby="title desc">
  <title id="title">מסלול הכניסה לתוקף של אמנת המגיפות</title>
  <desc id="desc">איור פנימי שמציג אימוץ, נספח PABS, חתימה ואשרור וכניסה לתוקף.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#0b1118"/><stop offset="1" stop-color="#101927"/></linearGradient>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse"><path d="M72 0H0V72" fill="none" stroke="#8fc7ff" stroke-opacity=".1"/></pattern>
  </defs>
  <rect width="720" height="1180" rx="32" fill="url(#bg)"/>
  <rect width="720" height="1180" rx="32" fill="url(#grid)"/>
  <text x="660" y="68" direction="rtl" text-anchor="start" fill="#f6f8fc" font-family="Arial, sans-serif" font-size="38" font-weight="800">״אומץ״ אינו ״בתוקף״</text>
  <text x="660" y="108" direction="rtl" text-anchor="start" fill="#aab3c5" font-family="Arial, sans-serif" font-size="22">כמה שלבים קודמים לכניסה לתוקף</text>
  <path d="M610 190V920" stroke="#d9b36a" stroke-width="4" stroke-linecap="round"/>
  <g transform="translate(48 150)">
    <rect width="624" height="180" rx="24" fill="#111b25" stroke="#8fc7ff" stroke-opacity=".48"/>
    <circle cx="562" cy="90" r="38" fill="#8fc7ff" fill-opacity=".14" stroke="#8fc7ff" stroke-width="2"/>
    <text x="562" y="101" text-anchor="middle" fill="#8fc7ff" font-family="Arial, sans-serif" font-size="30" font-weight="800">01</text>
    <text x="500" y="76" direction="rtl" text-anchor="start" fill="#f6f8fc" font-family="Arial, sans-serif" font-size="29" font-weight="800">אימוץ בעצרת</text>
    <text x="500" y="122" direction="rtl" text-anchor="start" fill="#aab3c5" font-family="Arial, sans-serif" font-size="23">20.5.2025</text>
  </g>
  <g transform="translate(48 360)">
    <rect width="624" height="180" rx="24" fill="#111b25" stroke="#d9b36a" stroke-opacity=".58"/>
    <circle cx="562" cy="90" r="38" fill="#d9b36a" fill-opacity=".14" stroke="#d9b36a" stroke-width="2"/>
    <text x="562" y="101" text-anchor="middle" fill="#e2c47f" font-family="Arial, sans-serif" font-size="30" font-weight="800">02</text>
    <text x="500" y="76" direction="rtl" text-anchor="start" fill="#f6f8fc" font-family="Arial, sans-serif" font-size="29" font-weight="800">נספח PABS</text>
    <text x="500" y="122" direction="rtl" text-anchor="start" fill="#aab3c5" font-family="Arial, sans-serif" font-size="23">עדיין דורש פרטים</text>
  </g>
  <g transform="translate(48 570)">
    <rect width="624" height="180" rx="24" fill="#111b25" stroke="#d9b36a" stroke-opacity=".58"/>
    <circle cx="562" cy="90" r="38" fill="#d9b36a" fill-opacity=".14" stroke="#d9b36a" stroke-width="2"/>
    <text x="562" y="101" text-anchor="middle" fill="#e2c47f" font-family="Arial, sans-serif" font-size="30" font-weight="800">03</text>
    <text x="500" y="76" direction="rtl" text-anchor="start" fill="#f6f8fc" font-family="Arial, sans-serif" font-size="29" font-weight="800">חתימה ואשרור</text>
    <text x="500" y="122" direction="rtl" text-anchor="start" fill="#aab3c5" font-family="Arial, sans-serif" font-size="23">לפי כל מדינה</text>
  </g>
  <g transform="translate(48 780)">
    <rect width="624" height="180" rx="24" fill="#111b25" stroke="#ffadad" stroke-opacity=".58"/>
    <circle cx="562" cy="90" r="38" fill="#ffadad" fill-opacity=".12" stroke="#ffadad" stroke-width="2"/>
    <text x="562" y="101" text-anchor="middle" fill="#ffadad" font-family="Arial, sans-serif" font-size="30" font-weight="800">04</text>
    <text x="500" y="76" direction="rtl" text-anchor="start" fill="#f6f8fc" font-family="Arial, sans-serif" font-size="29" font-weight="800">כניסה לתוקף</text>
    <text x="500" y="122" direction="rtl" text-anchor="start" fill="#aab3c5" font-family="Arial, sans-serif" font-size="23">אחרי 60 אשרורים</text>
