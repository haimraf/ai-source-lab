<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">מסלול הכניסה לתוקף של אמנת המגיפות</title>
  <desc id="desc">איור פנימי שמציג את ההבדל בין אימוץ, נספח PABS, חתימה, אשרור וכניסה לתוקף.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1118"/>
      <stop offset="1" stop-color="#101927"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <g opacity="0.16" stroke="#8fc7ff" stroke-width="1">
    <path d="M0 95H1200M0 190H1200M0 285H1200M0 380H1200M0 475H1200M0 570H1200M0 665H1200"/>
    <path d="M120 0V760M240 0V760M360 0V760M480 0V760M600 0V760M720 0V760M840 0V760M960 0V760M1080 0V760"/>
  </g>
  <text x="1060" y="78" direction="rtl" text-anchor="end" fill="#f6f8fc" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="900">עובדת בונוס: “אומץ” זה לא “בתוקף”</text>
  <text x="1060" y="118" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="22">באמנת המגיפות יש כמה שלבים לפני כניסה רשמית לתוקף</text>

  <path d="M1010 390H190" stroke="#d9b36a" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <circle cx="980" cy="390" r="48" fill="#111b25" stroke="#8fc7ff" stroke-width="3"/>
    <text x="980" y="407" text-anchor="middle" font-size="42">✅</text>
    <text x="1030" y="495" direction="rtl" text-anchor="end" fill="#f6f8fc" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="900">אימוץ בעצרת</text>
    <text x="1030" y="528" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="19">20.5.2025</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="720" cy="390" r="48" fill="#111b25" stroke="#d9b36a" stroke-width="3"/>
    <text x="720" y="407" text-anchor="middle" font-size="42">🧬</text>
    <text x="770" y="495" direction="rtl" text-anchor="end" fill="#f6f8fc" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="900">נספח PABS</text>
    <text x="770" y="528" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="19">עדיין דורש פרטים</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="460" cy="390" r="48" fill="#111b25" stroke="#d9b36a" stroke-width="3"/>
    <text x="460" y="407" text-anchor="middle" font-size="42">✍️</text>
    <text x="510" y="495" direction="rtl" text-anchor="end" fill="#f6f8fc" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="900">חתימה ואשרור</text>
    <text x="510" y="528" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="19">לפי כל מדינה</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="200" cy="390" r="48" fill="#111b25" stroke="#ffadad" stroke-width="3"/>
    <text x="200" y="407" text-anchor="middle" font-size="42">60</text>
    <text x="250" y="495" direction="rtl" text-anchor="end" fill="#f6f8fc" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="900">כניסה לתוקף</text>
    <text x="250" y="528" direction="rtl" text-anchor="end" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="19">אחרי 60 אשרורים</text>
  </g>

  <rect x="170" y="600" width="860" height="76" rx="22" fill="#111b25" stroke="#314254"/>
  <text x="600" y="646" direction="rtl" text-anchor="middle" fill="#e2c47f" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">הבדיקה לא מסתיימת בכותרת “אומץ”; צריך לבדוק באיזה שלב משפטי ההסכם נמצא</text>
  <text x="600" y="700" direction="rtl" text-anchor="middle" fill="#91a1b2" font-family="Arial, Helvetica, sans-serif" font-size="18">מקור בדיקה · איור פנימי · לא צילום מקור</text>
</svg>
