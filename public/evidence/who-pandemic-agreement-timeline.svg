  <text x="360" y="1034" direction="rtl" text-anchor="middle" fill="#e2c47f" font-family="Arial, sans-serif" font-size="23" font-weight="700">בודקים באיזה שלב משפטי ההסכם נמצא</text>
  <text x="360" y="1080" direction="rtl" text-anchor="middle" fill="#91a1b2" font-family="Arial, sans-serif" font-size="18">מקור בדיקה · איור פנימי · לא צילום מקור</text>
</svg>
