<svg xmlns="http://www.w3.org/2000/svg" width="720" height="460" viewBox="0 0 720 460" role="img" aria-labelledby="title desc">
  <title id="title">AI as a source visual</title>
  <desc id="desc">An abstract illustration of an AI answer being checked against a real source.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101827"/>
      <stop offset="1" stop-color="#070b10"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4d27a"/>
      <stop offset="1" stop-color="#b98b35"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="720" height="460" rx="34" fill="url(#bg)"/>
  <circle cx="640" cy="45" r="140" fill="#8fc7ff" opacity="0.08"/>
  <circle cx="80" cy="390" r="130" fill="#f4d27a" opacity="0.07"/>
  <g opacity="0.18" stroke="#ffffff" stroke-width="1">
    <path d="M0 78H720M0 156H720M0 234H720M0 312H720M0 390H720"/>
    <path d="M90 0V460M180 0V460M270 0V460M360 0V460M450 0V460M540 0V460M630 0V460"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="70" y="70" width="255" height="250" rx="22" fill="#111827" stroke="#314155"/>
    <rect x="95" y="98" width="205" height="28" rx="8" fill="#1f2a3a"/>
    <rect x="95" y="146" width="170" height="14" rx="7" fill="#8fc7ff" opacity="0.72"/>
    <rect x="95" y="176" width="195" height="14" rx="7" fill="#8fc7ff" opacity="0.44"/>
    <rect x="95" y="206" width="138" height="14" rx="7" fill="#8fc7ff" opacity="0.35"/>
    <text x="96" y="274" fill="#f6f8fc" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800">AI</text>
    <text x="160" y="274" fill="#aab3c5" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">answer</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="400" y="88" width="230" height="270" rx="24" fill="#0b111b" stroke="#d9b36a" stroke-opacity="0.42"/>
    <path d="M515 134L432 318H598L515 134Z" fill="url(#gold)" opacity="0.93"/>
    <path d="M474 225H556M456 266H575" stroke="#0b111b" stroke-width="7" opacity="0.35"/>
    <circle cx="576" cy="146" r="38" fill="#111827" stroke="#8fc7ff" stroke-width="6"/>
    <path d="M602 174L638 210" stroke="#8fc7ff" stroke-width="10" stroke-linecap="round"/>
  </g>
  <path d="M342 214H383" stroke="#f4d27a" stroke-width="7" stroke-linecap="round"/>
  <path d="M372 194L392 214L372 234" fill="none" stroke="#f4d27a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <g font-family="Arial, Helvetica, sans-serif" font-weight="800">
    <text x="70" y="390" fill="#f6f8fc" font-size="34">Answer is not a source</text>
    <text x="70" y="420" fill="#aab3c5" font-size="18">Open the source. Check the claim.</text>
  </g>
</svg>
