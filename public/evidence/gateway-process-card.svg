<svg xmlns="http://www.w3.org/2000/svg" width="720" height="460" viewBox="0 0 720 460" role="img" aria-labelledby="title desc">
  <title id="title">Gateway Process source-check visual</title>
  <desc id="desc">An editorial illustration of a declassified Gateway Process document being examined with audio wave and consciousness motifs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101827"/>
      <stop offset="1" stop-color="#070b10"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4d27a"/>
      <stop offset="1" stop-color="#b98b35"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5efe2"/>
      <stop offset="1" stop-color="#d6c6aa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="720" height="460" rx="34" fill="url(#bg)"/>
  <circle cx="612" cy="82" r="138" fill="#8fc7ff" opacity="0.08"/>
  <circle cx="104" cy="370" r="126" fill="#f4d27a" opacity="0.07"/>
  <g opacity="0.15" stroke="#ffffff" stroke-width="1">
    <path d="M0 78H720M0 156H720M0 234H720M0 312H720M0 390H720"/>
    <path d="M90 0V460M180 0V460M270 0V460M360 0V460M450 0V460M540 0V460M630 0V460"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="78" y="62" width="282" height="314" rx="18" fill="url(#paper)"/>
    <rect x="108" y="94" width="140" height="16" rx="4" fill="#7b5b22" opacity="0.9"/>
    <rect x="108" y="124" width="208" height="10" rx="5" fill="#172033" opacity="0.65"/>
    <rect x="108" y="148" width="182" height="10" rx="5" fill="#172033" opacity="0.45"/>
    <rect x="108" y="172" width="218" height="10" rx="5" fill="#172033" opacity="0.36"/>
    <rect x="108" y="214" width="190" height="10" rx="5" fill="#172033" opacity="0.32"/>
    <rect x="108" y="238" width="228" height="10" rx="5" fill="#172033" opacity="0.26"/>
    <rect x="108" y="262" width="164" height="10" rx="5" fill="#172033" opacity="0.22"/>
    <g transform="translate(226 288) rotate(-10)">
      <circle cx="0" cy="0" r="44" fill="none" stroke="#b0473c" stroke-width="5" opacity="0.9"/>
      <path d="M-22 0H22M0-22V22" stroke="#b0473c" stroke-width="5" opacity="0.75"/>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="420" y="78" width="224" height="276" rx="28" fill="#0b111b" stroke="#d9b36a" stroke-opacity="0.42"/>
    <circle cx="532" cy="200" r="72" fill="none" stroke="#8fc7ff" stroke-width="5" opacity="0.45"/>
    <circle cx="532" cy="200" r="42" fill="none" stroke="#8fc7ff" stroke-width="4" opacity="0.55"/>
    <path d="M476 204c22-30 90-30 112 0c-22 30-90 30-112 0Z" fill="#101827" stroke="#f4d27a" stroke-width="5"/>
    <circle cx="532" cy="204" r="18" fill="url(#gold)"/>
    <path d="M454 300c18-20 34-20 52 0s34 20 52 0s34-20 52 0" fill="none" stroke="#8fc7ff" stroke-width="7" stroke-linecap="round" opacity="0.8"/>
    <path d="M454 326c18-20 34-20 52 0s34 20 52 0s34-20 52 0" fill="none" stroke="#f4d27a" stroke-width="6" stroke-linecap="round" opacity="0.65"/>
  </g>

  <path d="M374 214H408" stroke="#f4d27a" stroke-width="7" stroke-linecap="round"/>
  <path d="M398 194L418 214L398 234" fill="none" stroke="#f4d27a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <g font-family="Arial, Helvetica, sans-serif" font-weight="800">
    <text x="70" y="412" fill="#f6f8fc" font-size="32">Gateway document is real</text>
    <text x="70" y="438" fill="#aab3c5" font-size="18">A source check, not a leap to proof</text>
  </g>
</svg>
